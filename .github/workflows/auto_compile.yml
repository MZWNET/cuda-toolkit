# `dist/index.js` is a special file in Actions.
# When you reference an action with `uses:` in a workflow,
# `index.js` is the code that will run.
# For our project, we generate this file through a build process from other source files.
# We need to make sure the checked-in `index.js` actually matches what we expect it to be.
name: Auto Compile dist/index.js

on:
  workflow_dispatch:
    inputs:
      force_compile:
        description: Force compile the dist/index.js file
        required: false
        type: boolean
  push:
    branches:
      - master
      - compile

jobs:
  auto_compile:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Set Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          check-latest: true

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          cache: true

      - name: Install dependencies
        run: |
          pnpm i --frozen-lockfile

      - name: Rebuild the dist/ directory
        run: pnpm run package

      - name: Upload dist/index.cjs to GitHub Repository
        run: |
          git clone https://github-action:${{ secrets.GITHUB_TOKEN }}@github.com/MZWNET/cuda-toolkit.git -b master cache
          mkdir -p cache/dist
          rm -rf cache/dist/index.cjs
          cp dist/index.cjs cache/dist/index.cjs
          cp dist/index.cjs.map cache/dist/index.cjs.map
          cd cache
          if ! git diff --quiet HEAD -- dist/index.cjs; then
            echo "dist/index.cjs has changes."
            git config --local user.email "actions@github.com"
            git config --local user.name "GitHub Actions Bot"
            git status
            git add dist/index.cjs dist/index.cjs.map
            git commit -m "feat: update dist/index.cjs"
            git push origin master
          else
            echo "No changes in dist/index.cjs."
          fi
